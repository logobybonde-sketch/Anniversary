<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ayu ❤️</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#ffd6e7,#fff);
  text-align:center;
  padding:40px;
  color:#333;
}
.card{
  background:white;
  max-width:500px;
  margin:auto;
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 30px #ccc;
}
h1{color:#e91e63;}
button{
  background:#e91e63;
  color:white;
  border:0;
  padding:12px 25px;
  border-radius:20px;
  font-size:16px;
}
#love{display:none;margin-top:20px;font-size:18px;}
</style>
</head>
<body>
<div class="card">
<h1>For Ayu Destianty ❤️</h1>
<p>Happy Anniversary sayang ✨</p>
<p>27 Juni adalah salah satu tanggal paling berarti buat aku.</p>
<button onclick="showLove()">Klik disini 💕</button>
<div id="love">
<p>Aku bersyukur bisa jalan bareng kamu. Semoga kita selalu bareng, saling jaga, dan terus bikin cerita indah ❤️</p>
</div>
</div>

<script>
function showLove(){
document.getElementById("love").style.display="block";
}
</script>
</body>
</html>
